<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景圓形 -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#ff4757"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 外圈金邊 -->
  <circle cx="50" cy="50" r="46" fill="url(#goldGrad)" filter="url(#glow)"/>
  
  <!-- 內圈紅底 -->
  <circle cx="50" cy="50" r="40" fill="url(#redGrad)"/>
  
  <!-- 金元寶符號 -->
  <text x="50" y="58" font-size="36" text-anchor="middle" fill="url(#goldGrad)" font-weight="bold">💰</text>
  
  <!-- JMONEY 文字 -->
  <text x="50" y="88" font-size="10" text-anchor="middle" fill="#fbbf24" font-weight="bold" letter-spacing="2">JMONEY</text>
</svg>
